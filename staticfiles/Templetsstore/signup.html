<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Signup</h2>
        {% if error_message %}
            <div class="alert alert-danger" role="alert">
                {{ error_message }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" name="role" required>
                    <option value="user">User</option>
                    <option value="associate">Associate</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="business_name" class="form-label">Business Name</label>
                <input type="text" class="form-control" id="business_name" name="business_name" required>
            </div>
            <div class="mb-3">
                <label for="official_email" class="form-label">Official Email</label>
                <input type="email" class="form-control" id="official_email" name="official_email" required>
            </div>
            <div class="mb-3">
                <label for="contact_number" class="form-label">Contact Number</label>
                <input type="text" class="form-control" id="contact_number" name="contact_number" required>
            </div>
            <div class="mb-3">
                <label for="deals_in" class="form-label">Deals in</label>
                <input type="text" class="form-control" id="deals_in" name="deals_in" required>
            </div>
            <div class="mb-3">
                <label for="establishment_year" class="form-label">Establishment Year</label>
                <input type="number" class="form-control" id="establishment_year" name="establishment_year" required>
            </div>
            <div class="mb-3">
                <label for="connecting_person" class="form-label">Connecting Person Name</label>
                <input type="text" class="form-control" id="connecting_person" name="connecting_person" required>
            </div>
            <div class="mb-3">
                <label for="connecting_person_contact" class="form-label">Connecting Person Contact Number</label>
                <input type="text" class="form-control" id="connecting_person_contact" name="connecting_person_contact" required>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Signup</button>
        </form>
        <h5 class="mt-4">Already have an account?</h5>
        <ul>
            <li><a href="{% url 'user_login' %}">User Login</a></li>
            <li><a href="{% url 'associate_login' %}">User Associate Login</a></li>
            <li><a href="{% url 'admin_login' %}">Admin Login</a></li>
        </ul>
    </div>
</body>
</html>
