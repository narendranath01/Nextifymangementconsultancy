<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit - {{ blog.title }}</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            padding: 0; /* Remove padding */
            margin: 0; /* Remove margin */
        }
        h1 {
            color: #333;
            text-align: center;
            font-weight: bold;
            font-style: italic;
            font-family: 'Cursive', sans-serif; /* Use a cursive font */
        }
        .header {
            display: flex;
            justify-content: center; /* Center the header title */
            align-items: center;
            padding: 0; /* Remove padding */
            background-color: #4a9e4a; /* Change to a more appealing color */
            color: white;
        }
        .header img {
            height: 50px; /* Adjust logo size */
            margin-right: auto; /* Align logo to the left */
            padding: 10px; /* Add padding to the logo */
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #5cb85c;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Nextify Blogs</h1>
        <img src="/static/path/to/logo.png" alt="NMC Logo"> <!-- Adjust logo path -->
    </div>
    <h1>Edit Blog Post</h1>
    {% if user.is_authenticated and (user.is_admin or user.is_associate) %}
        <form method="POST">
            {% csrf_token %}
            <label for="title">Title:</label>
            <input type="text" name="title" value="{{ blog.title }}" required>
            <br>
            <label for="content">Content:</label>
            <textarea name="content" required>{{ blog.content }}</textarea>
            <br>
            <button type="submit">Save</button>
        </form>
        <a href="{% url 'blog_detail' blog.id %}">Cancel</a>
    {% else %}
        <p>You do not have permission to edit this blog post.</p>
    {% endif %}
    <footer>
        <p style="text-align: center;">&copy; 2023 NMC. All rights reserved.</p>
    </footer>
</body>
</html>
