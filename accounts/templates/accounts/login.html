{% extends "index.html" %}

{% block title %}User Login{% endblock title %}

{% block body %}
<div class="container mt-5">
    <!-- Centered User Box -->
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg border-0">
                <div class="card-body text-center">
                    <h3 class="card-title fw-bold mb-4">
                        <i class="fas fa-user"></i> User Login
                    </h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <!-- Checkbox for "Remember Me" -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                            <label class="form-check-label" for="remember_me">Remember Me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <div class="mt-3">
                        <a href="{% url 'signup' %}" class="d-block mb-2">Signup here</a>
                        <a href="{% url 'reset_password' %}" class="d-block mb-2">Forgot Password?</a>
                        <a href="{% url 'associate_login' %}" class="d-block">Staff login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
