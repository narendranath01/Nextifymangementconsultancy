<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 100px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-container .form-control {
            margin-bottom: 15px;
        }
        .login-container .btn {
            width: 100%;
            margin-top: 10px;
        }
        .login-container .alert {
            margin-top: 15px;
        }
        .login-container .login-links {
            margin-top: 20px;
            text-align: center;
        }
        .login-container .login-links a {
            margin: 0 10px;
            color: #007bff;
            text-decoration: none;
        }
        .login-container .login-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>User Login</h2>

        <!-- Display error messages -->
        {% if error_message %}
            <div class="alert alert-danger" role="alert">
                {{ error_message }}
            </div>
        {% endif %}

        <!-- Login Options -->
        <div class="login-links mt-4">
            <h5>Login as:</h5>
            <ul class="list-unstyled">
                <li><a href="{% url 'user_login' %}">User</a></li>
                <li><a href="{% url 'associate_login' %}">Associate</a></li>
                <li><a href="{% url 'admin_login' %}">Admin</a></li>
                
                
            </ul>
        </div>

        <!-- Login Form -->
        <form method="POST" class="form-signin">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <!-- Forgot Password Link -->
        <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </div>

        
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
